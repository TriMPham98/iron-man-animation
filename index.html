<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" />
    <meta name="color-scheme" content="dark" />
    <title>Mark Suit — Assembly Sequence</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Critical CSS: paint dark on first frame — no white flash before JS/CSS modules -->
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050508;
        color: #e8e4d9;
        color-scheme: dark;
      }
      #app {
        position: relative;
        width: 100%;
        height: 100%;
        background: #050508;
      }
      #scene-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #050508;
      }
      #loading {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        background: #050508;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      }
      #loading .loading-label {
        margin: 0;
        font-size: 0.7rem;
        letter-spacing: 0.28em;
        color: rgba(232, 228, 217, 0.55);
      }
      #loading .loading-mark {
        color: #c9a227;
        font-size: 1.75rem;
        margin-bottom: 1.25rem;
        text-align: center;
      }
      #loading .loading-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        min-width: min(320px, 80vw);
      }
      #loading .loading-bar {
        width: 100%;
        height: 2px;
        background: rgba(201, 162, 39, 0.15);
        overflow: hidden;
      }
      #loading .loading-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #b01020, #e8c547);
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <canvas id="scene-canvas"></canvas>

      <div id="vignette" aria-hidden="true"></div>
      <div id="scanlines" aria-hidden="true"></div>

      <div id="loading" class="panel">
        <div class="loading-inner">
          <div class="loading-mark">◆</div>
          <p class="loading-label">INITIALIZING SUIT SYSTEMS…</p>
          <div class="loading-bar">
            <div id="loading-fill" class="loading-fill"></div>
          </div>
        </div>
      </div>

      <header id="hud-top" class="hud hud-top hidden">
        <span class="hud-brand">MARK SUIT // PROTO</span>
        <div id="hud-center" class="hud-center">
          <h1 id="title" class="title">ASSEMBLY SEQUENCE</h1>
          <p id="status" class="status">STAND BY</p>
        </div>
        <span id="hud-clock" class="hud-clock">00:00.00</span>
      </header>

      <footer id="hud-bottom" class="hud hud-bottom hidden">
        <div class="hud-left">
          <span id="integrity">INTEGRITY — — —</span>
          <span id="hint" class="hint">Drag to orbit · R to replay · Space pause</span>
        </div>
        <button id="replay-btn" type="button" class="replay-btn" disabled>
          REPLAY
        </button>
      </footer>

      <div id="debug-scrubber" class="debug-scrubber hidden" aria-label="Assembly debug scrubber">
        <div class="debug-scrubber-row">
          <button id="debug-pause-btn" type="button" class="debug-pause-btn" title="Pause / play (Space)">
            PAUSE
          </button>
          <input
            id="debug-progress"
            class="debug-progress"
            type="range"
            min="0"
            max="1000"
            value="0"
            step="1"
            aria-label="Assembly progress"
          />
          <span id="debug-progress-label" class="debug-progress-label">0%</span>
        </div>
        <div id="debug-active-piece" class="debug-active-piece" aria-live="polite">
          MOVING — —
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
