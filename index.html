<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" />
    <meta name="color-scheme" content="dark" />
    <title>MK III — Assembly Sequence</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!--
      Critical CSS: solid page shell + content-sized loader.
      Do NOT put a full-screen fill on #loading — that was the dark-gray block.
    -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050508;
        color: #e8e4d9;
        color-scheme: dark;
      }
      #app {
        display: none;
        position: absolute;
        inset: 0;
        background: #050508;
      }
      body.scene-ready #app {
        display: block;
      }
      #scene-canvas {
        display: block;
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: #050508;
      }
      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
        margin: 0;
        padding: 0;
        background: none;
        border: none;
        box-shadow: none;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        text-align: center;
      }
      #loading .loading-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        width: 320px;
        max-width: 80vw;
      }
      #loading .loading-mark {
        color: #c9a227;
        font-size: 1.75rem;
        line-height: 1;
      }
      #loading .loading-label {
        margin: 0;
        font-size: 0.7rem;
        letter-spacing: 0.28em;
        color: rgba(232, 228, 217, 0.55);
        white-space: nowrap;
      }
      #loading .loading-bar {
        width: 100%;
        height: 2px;
        background: rgba(201, 162, 39, 0.15);
        overflow: hidden;
      }
      #loading .loading-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #b01020, #e8c547);
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Content-sized loader only (no full-screen fill = no gray block) -->
    <div id="loading" role="status" aria-live="polite">
      <div class="loading-inner">
        <div class="loading-mark" aria-hidden="true">◆</div>
        <p class="loading-label">INITIALIZING SUIT SYSTEMS…</p>
        <div class="loading-bar" aria-hidden="true">
          <div id="loading-fill" class="loading-fill"></div>
        </div>
      </div>
    </div>

    <div id="app">
      <canvas
        id="scene-canvas"
        role="img"
        aria-label="Iron Man–inspired suit assembly sequence in 3D"
      ></canvas>

      <div id="vignette" aria-hidden="true"></div>
      <div id="scanlines" aria-hidden="true"></div>

      <header id="hud-top" class="hud hud-top hidden">
        <span class="hud-brand">MK III</span>
        <div id="hud-center" class="hud-center">
          <h1 id="title" class="title">ASSEMBLY SEQUENCE</h1>
          <p id="status" class="status" aria-live="polite">STAND BY</p>
        </div>
        <div class="hud-top-right">
          <button
            id="director-btn"
            type="button"
            class="director-btn"
            aria-pressed="false"
            title="Director mode — scrubber & plate pick"
          >
            DIR
          </button>
          <span id="hud-clock" class="hud-clock" aria-hidden="true">00:00.00</span>
        </div>
      </header>

      <footer id="hud-bottom" class="hud hud-bottom hidden">
        <div class="hud-bottom-row">
          <div class="hud-left">
            <span id="integrity" aria-live="polite">INTEGRITY — — —</span>
            <span id="hint" class="hint">Drag to orbit · R replay · Space pause · S skip</span>
          </div>

          <div id="debug-scrubber" class="debug-scrubber hidden" aria-label="Assembly progress">
            <div class="debug-scrubber-row">
              <button id="debug-pause-btn" type="button" class="debug-pause-btn" title="Pause / play (Space)">
                PAUSE
              </button>
              <input
                id="debug-progress"
                class="debug-progress"
                type="range"
                min="0"
                max="1000"
                value="0"
                step="1"
                aria-label="Assembly progress"
              />
              <span id="debug-progress-label" class="debug-progress-label">0%</span>
            </div>
          </div>

          <div class="hud-actions">
            <button id="skip-btn" type="button" class="skip-btn" disabled>
              SKIP
            </button>
            <button id="replay-btn" type="button" class="replay-btn" disabled>
              REPLAY
            </button>
          </div>
        </div>

        <div id="hud-bottom-meta" class="hud-bottom-meta hidden">
          <div id="debug-active-piece" class="debug-active-piece" aria-live="polite">
            MOVING — —
          </div>
          <div id="debug-picked-piece" class="debug-picked-piece" aria-live="polite">
            PICK · click a plate
          </div>
          <div class="hud-bottom-meta-spacer" aria-hidden="true"></div>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
