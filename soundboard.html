<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" />
    <meta name="color-scheme" content="dark" />
    <title>MK III — Soundboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="soundboard-app">
      <header class="sb-header">
        <div class="sb-title-block">
          <p class="sb-kicker">MK III · AUTHORING</p>
          <h1>Soundboard</h1>
          <p class="sb-sub">
            Play SFX at slow speed, record a timed sequence, copy for chat.
          </p>
        </div>
        <a class="sb-link" href="/">← Assembly</a>
      </header>

      <section class="sb-controls" aria-label="Playback controls">
        <label class="sb-field">
          <span>Speed</span>
          <input
            id="speed"
            type="range"
            min="0.25"
            max="1.5"
            step="0.05"
            value="0.5"
          />
          <output id="speed-value" for="speed">0.50×</output>
        </label>

        <label class="sb-field sb-check">
          <input id="export-1x" type="checkbox" checked />
          <span>Export times scaled to 1×</span>
        </label>

        <div class="sb-rec-bar">
          <button id="btn-rec" type="button" class="btn btn-rec">● REC</button>
          <button id="btn-stop" type="button" class="btn" disabled>STOP</button>
          <button id="btn-clear" type="button" class="btn">CLEAR</button>
          <button id="btn-replay" type="button" class="btn" disabled>REPLAY</button>
          <button id="btn-copy" type="button" class="btn btn-primary" disabled>
            COPY CARD
          </button>
          <span id="rec-status" class="sb-status" aria-live="polite">idle</span>
          <span id="rec-clock" class="sb-clock" aria-hidden="true">0.000s</span>
        </div>
      </section>

      <section class="sb-pads" id="pads" aria-label="Sound pads"></section>

      <section class="sb-sequence" aria-label="Recorded sequence">
        <div class="sb-seq-head">
          <h2>Sequence</h2>
          <span id="event-count" class="sb-muted">0 events</span>
        </div>
        <ol id="event-list" class="sb-event-list"></ol>
        <label class="sb-export-label" for="export-out">Pasteable card</label>
        <textarea
          id="export-out"
          class="sb-export"
          readonly
          rows="12"
          spellcheck="false"
          placeholder="Hit REC, play pads, then COPY CARD…"
        ></textarea>
      </section>
    </div>
    <script type="module" src="/src/soundboard/main.ts"></script>
  </body>
</html>
